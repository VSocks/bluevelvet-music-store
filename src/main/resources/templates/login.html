<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Music Store</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .register-link {
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <h1><i class="fas fa-music"></i> Music Store Admin</h1>

        <div th:if="${logoutMessage}" class="alert alert-success">
            <i class="fas fa-check-circle"></i> <span th:text="${logoutMessage}"></span>
        </div>

        <div th:if="${successMessage}" class="alert alert-success">
            <i class="fas fa-check-circle"></i> <span th:text="${successMessage}"></span>
        </div>

        <form th:action="@{/login}" method="post" id="loginForm">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" name="email" required
                       placeholder="admin@musicstore.com">
            </div>

            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" required
                       placeholder="Minimum 8 characters">
                <div id="passwordError" class="error-message"></div>
            </div>

            <div th:if="${errorMessage}" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i> <span th:text="${errorMessage}"></span>
            </div>

            <div class="form-group remember">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Remember me</label>
            </div>

            <button type="submit" class="btn btn-primary">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>

            <div class="register-link">
                <p>Don't have an account?
                    <a th:href="@{/register}"><i class="fas fa-user-plus"></i> Register here</a>
                </p>
            </div>
        </form>
    </div>
</div>


<script th:src="@{/js/script.js}"></script>
</body>
</html>
